name: CMake Multi-Platform Build & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            platform: windows-msvc
            lib_name: HyperDB.lib
            python_lib_name: HyperDB.pyd
            test_exe: HyperDB-Test.exe
            
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            platform: linux-gcc
            lib_name: libHyperDB.a
            python_lib_name: HyperDB.so
            test_exe: HyperDB-Test
            
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            platform: linux-clang
            lib_name: libHyperDB.a
            python_lib_name: HyperDB.so
            test_exe: HyperDB-Test

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-pip
        pip3 install pybind11 || true

    - name: Build Base Library
      shell: bash
      run: |
        cmake -B build-base \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -S "${{ github.workspace }}"
        cmake --build build-base --config Release --target HyperDB --parallel

    - name: Copy Library to Test Dir
      shell: bash
      run: |
        mkdir -p "${{ github.workspace }}/HyperDB-Test/include/lib"
        find "${{ github.workspace }}/build-base" -name "${{ matrix.lib_name }}" -exec cp {} "${{ github.workspace }}/HyperDB-Test/include/lib/" \;
        ls -la "${{ github.workspace }}/HyperDB-Test/include/lib/"

    - name: Build Test Executable
      shell: bash
      run: |
        cmake -B build-test \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=Release \
          -S "${{ github.workspace }}/HyperDB-Test"
        cmake --build build-test --config Release --parallel

    - name: Build Python Library
      shell: bash
      run: |
        cmake -B build-pylib \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DBUILD_PYTHON_MODULE=ON \
          -S "${{ github.workspace }}"
        cmake --build build-pylib --config Release --target HyperDB --parallel

    - name: Copy Library to Python Dir
      shell: bash
      run: |
        mkdir -p "${{ github.workspace }}/HyperDB-Python/include/lib"
        find "${{ github.workspace }}/build-pylib" -name "${{ matrix.lib_name }}" -exec cp {} "${{ github.workspace }}/HyperDB-Python/include/lib/" \;
        ls -la "${{ github.workspace }}/HyperDB-Python/include/lib/"

    - name: Build Python Module
      shell: bash
      run: |
        cmake -B build-pymod \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=Release \
          -S "${{ github.workspace }}/HyperDB-Python"
        cmake --build build-pymod --config Release --parallel

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p "artifacts/${{ matrix.platform }}"
        
        # Copy base library
        find "${{ github.workspace }}/build-base" -name "${{ matrix.lib_name }}" -exec cp {} "artifacts/${{ matrix.platform }}/" \;
        
        # Copy header
        cp "${{ github.workspace }}/HyperDB/HyperDB.h" "artifacts/${{ matrix.platform }}/"
        
        # Copy test executable
        find "${{ github.workspace }}/build-test" -name "${{ matrix.test_exe }}" -exec cp {} "artifacts/${{ matrix.platform }}/" \;
        chmod +x "artifacts/${{ matrix.platform }}/${{ matrix.test_exe }}" 2>/dev/null || true
        
        # Copy Python module
        find "${{ github.workspace }}/build-pymod" -name "${{ matrix.python_lib_name }}" -exec cp {} "artifacts/${{ matrix.platform }}/" \;
        
        # Copy bindings source
        cp "${{ github.workspace }}/HyperDB-Python/HyperDB-Python/main.cpp" "artifacts/${{ matrix.platform }}/bindings.cpp"
        
        echo "=== Artifacts ==="
        ls -la "artifacts/${{ matrix.platform }}/"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hyperdb-${{ matrix.platform }}
        path: artifacts/${{ matrix.platform }}/
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: hyperdb-*

    - name: Create Archives
      run: |
        cd artifacts
        for dir in hyperdb-*/; do
          platform=$(basename "$dir" | sed 's/hyperdb-//')
          cd "$dir"
          zip -r "../hyperdb-${platform}-${{ github.ref_name }}.zip" *
          cd ..
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.zip
        name: ${{ github.ref_name }}
        body: |
          HyperDB ${{ github.ref_name }}
          
          ## Included Binaries
          
          ### Windows (MSVC)
          - `HyperDB.lib` - Static library for C++
          - `HyperDB.pyd` - Python module
          - `HyperDB-Test.exe` - Test executable
          - [HyperDB.h](cci:7://file:///c:/Users/tnt/source/repos/HyperDB/HyperDB/HyperDB.h:0:0-0:0) - Header file
          - `bindings.cpp` - Python bindings source
          
          ### Linux (GCC & Clang)
          - `libHyperDB.a` - Static library for C++
          - `HyperDB.so` - Python module
          - [HyperDB-Test](cci:9://file:///c:/Users/tnt/source/repos/HyperDB/HyperDB-Test:0:0-0:0) - Test executable
          - [HyperDB.h](cci:7://file:///c:/Users/tnt/source/repos/HyperDB/HyperDB/HyperDB.h:0:0-0:0) - Header file
          - `bindings.cpp` - Python bindings source
          
          ## Build Info
          - CMake Release configuration
          - C++20 standard
          - Python 3.11+ compatible
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}